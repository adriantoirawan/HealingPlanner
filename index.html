<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Healing Planner</title>

    <!-- Bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Healing Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="inde">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content-->
    <div class="container-fluid mt-4">
      <div class="row">
        <!-- Filter Sidebar -->
        <div class="col-md-3 col-lg-2 mb-4">
          <div class="card">
            <article class="card-group-item">
              <header class="card-header">
                <h6 class="title">Filters</h6>
              </header>
            </article>

            <article class="card-group-item">
              <header class="card-header">
                <h6 class="title">Tags</h6>
              </header>
              <div class="filter-content">
                <div class="card-body">
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="Check1"
                    />
                    <label class="form-check-label" for="Check1">Outdoor</label>
                  </div>

                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="Check2"
                    />
                    <label class="form-check-label" for="Check2">Indoor</label>
                  </div>

                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="Check3"
                    />
                    <label class="form-check-label" for="Check3">Dating</label>
                  </div>

                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="Check4"
                    />
                    <label class="form-check-label" for="Check4">Cheap</label>
                  </div>
                </div>
              </div>
            </article>

            <article class="card-group-item">
              <header class="card-header">
                <h6 class="title">Budget</h6>
              </header>
              <div class="filter-content">
                <div class="card-body">
                  <div class="row g-2">
                    <div class="col-6">
                      <label>Min (Rp)</label>
                      <input
                        type="number"
                        class="form-control"
                        placeholder="0"
                      />
                    </div>
                    <div class="col-6 text-end">
                      <label>Max (Rp)</label>
                      <input
                        type="number"
                        class="form-control"
                        placeholder="10,000,000"
                      />
                  </div>
                </div>
              </div>
            </article>
          </div>
        </div>

        <!-- Search, Action Buttons And Contents-->
        <div class="col-md-9 col-lg-10">
          <!-- Search & Action Buttons -->
          <div class="container-fluid px-0" id="search-bar">
            <!-- Search -->
            <form class="d-flex w-100 mb-4">
              <div class="input-group">
                <input
                  class="form-control"
                  type="search"
                  placeholder="Search"
                  aria-label="Search"
                />
                <button class="btn btn-outline-success" type="submit">
                  Search
                </button>
              </div>
            </form>

            <!-- Action Buttons -->
            <div
              class="d-flex justify-content-between align-items-center mb-4"
              id="activity-buttons"
            >
              <div class="d-flex gap-2" id="budget-sort">
                <button type="button" class="btn btn-dark">
                  Budget Ascending
                </button>
                <button type="button" class="btn btn-light border">
                  Budget Descending
                </button>
              </div>

              <div class="d-flex gap-2" id="action-buttons">
                <button
                  type="button"
                  class="btn btn-dark rounded-circle"
                  id="pick-for-me-btn"
                >
                  <i class="bi bi-magic"></i>
                </button>
                <a href="create-healing-wishlist.html" class="btn btn-dark">
                  Add New Wishlist
                </a>
              </div>
            </div>
          </div>

          <!-- Contents -->
          <div id="activities-container" class="d-flex flex-column gap-3 mb-5 pb-5">
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 fixed-bottom">
      <div class="container-fluid">
        <p class="mb-1">
          &copy; 2026 Healing Planner. All Rights Reserved. Team PALM
        </p>
      </div>
    </footer>

    <!-- Bootstrap javascripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Backend Javascripts -->
    <script src="js/storageManager.js"></script>
    <!-- Integration Between Frontend and Backends -->
    <script src="js/app.js"></script>
</body>
</html>
