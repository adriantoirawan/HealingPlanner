<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add - Healing Planner</title>

    <!-- Bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Healing Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link active" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <div class="container-fluid mt-4 px-5">
      <h2>Add New Healing Wishlist</h2>
      <p class="text-secondary pb-3">Fill in your dream healing activity!</p>

      <form class="border rounded px-4">
        <!-- Title -->
        <div class="mb-4 mt-3">
          <label class="form-label">Title</label>
          <input
            type="text"
            class="form-control"
            placeholder="The name of the healing activity"
            id="healing-title"
            required
          />
        </div>

        <!-- Image -->
        <div class="mb-4">
          <label class="form-label">Healing Activity Image</label>
          <input type="file" class="form-control" id="healing-image"/>
        </div>

        <!-- Location -->
        <div class="mb-4">
          <label class="form-label">Location</label>
          <input
            type="text"
            class="form-control"
            placeholder="Location of the healing activity"
            id="healing-location"
          />
        </div>

        <!-- Budget -->
        <div class="mb-4">
          <label class="form-label">Budget</label>
          <input
            type="number"
            class="form-control"
            placeholder="Budget of the healing activity"
            id="healing-budget"
            required
          />
        </div>

        <!-- Description -->
        <div class="mb-4">
          <label class="form-label">Description</label>
          <input
            type="text"
            class="form-control"
            placeholder="Description of the healing activity"
            id="healing-description"
          />
        </div>

        <!-- Tags -->
        <div class="col mt-4 mb-4">
          <i class="bi bi-tag"></i>
          <button type="button" class="btn btn-dark btn-sm">
            Add Tag <i class="bi bi-x"></i>
          </button>
        </div>

        <!-- Submit -->
        <button class="btn btn-dark mt-4 mb-4 w-100" id="add-wishlist-button">Add Wishlist</button>
      </form>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-5">
      <div class="container-fluid">
        <p class="mb-1">
          &copy; 2026 Healing Planner. All Rights Reserved. Team PALM
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Backend Javascripts -->
    <script src="js/storageManager.js"></script>
    <!-- Integration Between Frontend and Backends -->
    <script src="js/app.js"></script>
  </body>
</html>
