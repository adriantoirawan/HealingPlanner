<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Healing Planner</title>

    <!-- Bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary px-5">
      <div class="container-fluid">
        <a class="navbar-brand ps-5" href="index.html">Healing Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about-us.html">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content-->
    <div class="container mt-4 px-5 mb-5 pb-4">
      <img
        src="https://via.placeholder.com/1200x400?text=Loading..."
        class="img-fluid w-100 rounded"
        style="height: 349px; object-fit: cover; object-position: center 50%"
        alt="vacation trip"
        id="view-image"
      />
      <h6 class="mt-3 text-secondary" id="view-location">
        📍 Loading location...
      </h6>

      <div class="card mt-3 shadow-sm border-0" style="width: auto">
        <div class="card-body p-4">
          <h4 class="card-title fw-bold fs-2" id="view-title">
            Loading Title...
          </h4>
          <p class="card-text text-secondary mt-3 fs-5" id="view-description">
            Loading description...
          </p>

          <div class="row mt-5 align-items-center">
            <div class="col" id="view-tags"></div>

            <h4 class="text-end col text-success fw-bold mb-0" id="view-budget">
              Rp0
            </h4>
          </div>
        </div>
      </div>

      <div class="text-end mt-4">
        <button class="btn btn-dark px-4" id="view-edit-btn">Edit</button>
        <button class="btn btn-danger px-4" id="view-delete-btn">Delete</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-4">
      <div class="container-fluid">
        <p class="mb-1">
          &copy; 2026 Healing Planner. All Rights Reserved. Team PALM
        </p>
      </div>
    </footer>

    // Delete Modal
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Confirm Delete</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            You’re going to delete this wishlist permanently. Are you sure?
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-danger"
              id="execute-delete-btn"
            >
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap javascripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Backend Javascripts -->
    <script src="js/storageManager.js"></script>
    <script src="js/view-activity.js"></script>
  </body>
</html>
