<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Healing Planner</title>

    <!-- Bootstrap css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Healing Planner</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">About Us</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content-->
    <div class="container-fluid mt-4 px-5">
      <img
        src="img.jpg"
        class="img-fluid w-100"
        style="height: 349px; object-fit: cover; object-position: center 90%"
        alt="vacation trip"
      />
      <h6 class="mt-2">📍 Pandawa Beach - Bali, Indonesia</h6>

      <div class="card" style="width: auto">
        <div class="card-body">
          <h4 class="card-title">Title</h4>
          <p class="card-text">Description and plan about your trip...</p>
          <div class="row mt-5">
            <div class="col">
              <span class="badge text-bg-secondary">Outdoor</span>
              <span class="badge text-bg-dark">Dating</span>
            </div>

            <p class="text-end col">Rp200.000</p>
          </div>
        </div>
      </div>

      <div class="text-end mt-2">
        <button class="btn btn-dark" type="submit">Edit</button>
        <button class="btn btn-light" type="submit">Delete</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-4">
      <div class="container-fluid">
        <p class="mb-1">
          &copy; 2026 Healing Planner. All Rights Reserved. Team PALM
        </p>
      </div>
    </footer>

    <!-- Bootstrap javascripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- Backend Javascripts -->
    <script src="js/storageManager.js"></script>
  </body>
</html>
